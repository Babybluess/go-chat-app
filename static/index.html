<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>gochat</title>
  <style>
    body { font-family: system-ui; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    #messages { border: 1px solid #ddd; border-radius: 8px; height: 400px;
                overflow-y: auto; padding: 12px; margin-bottom: 12px; }
    .msg { padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .msg.system { color: #888; font-style: italic; }
    form { display: flex; gap: 8px; }
    input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; }
    button { padding: 8px 16px; background: #5b5bd6; color: #fff;
             border: none; border-radius: 6px; cursor: pointer; }
    #status { font-size: 12px; color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>gochat</h2>
  <div id="status">Connecting…</div>
  <div id="messages"></div>
  <form id="form">
    <input id="input" placeholder="Type a message…" autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <script>
    const messages = document.getElementById('messages')
    const status   = document.getElementById('status')
    const input    = document.getElementById('input')

    function addMessage(text, type = 'chat') {
      const div = document.createElement('div')
      div.className = `msg ${type}`
      div.textContent = text
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    }

    const ws = new WebSocket(`ws://${location.host}/ws`)

    ws.onopen = () => {
      status.textContent = '● Connected'
      status.style.color = '#1D9E75'
      addMessage('Connected to chat', 'system')
    }

    ws.onmessage = (e) => {
      e.data.split('\n').filter(Boolean).forEach(line => addMessage(line))
    }

    ws.onclose = () => {
      status.textContent = '○ Disconnected'
      status.style.color = '#E24B4A'
      addMessage('Disconnected from chat', 'system')
    }

    ws.onerror = (err) => {
      addMessage(`WebSocket error`, 'system')
    }

    document.getElementById('form').addEventListener('submit', (e) => {
      e.preventDefault()
      if (ws.readyState === WebSocket.OPEN && input.value.trim()) {
        ws.send(input.value.trim())
        input.value = ''
      }
    })
  </script>
</body>
</html>

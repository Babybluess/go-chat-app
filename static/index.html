<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>gochat</title>
  <style>
    body { font-family: system-ui; max-width: 640px; margin: 40px auto; padding: 0 16px; }
    #messages { border: 1px solid #ddd; border-radius: 8px; height: 400px;
                overflow-y: auto; padding: 12px; margin-bottom: 12px; }
    .msg { padding: 4px 0; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
    .msg.system { color: #888; font-style: italic; }
    form { display: flex; gap: 8px; margin-top: 10px}
    input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; }
    button { padding: 8px 16px; background: #5b5bd6; color: #fff;
             border: none; border-radius: 6px; cursor: pointer; }
    #status { font-size: 12px; color: #888; margin-bottom: 8px; }
  </style>
</head>
<body>
  <h2>gochat</h2>
  <div id="status">Connecting…</div>
  <div id="messages"></div>
  <form id="room-form">
    <input id="room-input" placeholder="Room name…" autocomplete="off">
    <button type="submit">Join</button>
  </form>
  <form id="name-form">
    <input id="name-input" placeholder="Enter your name…" autocomplete="off">
    <button type="submit">Register</button>
  </form>
  <form id="chat-form" style="display:none">
    <input id="input" placeholder="Type a message…" autocomplete="off">
    <button type="submit">Send</button>
  </form>

  <script>
    const messages = document.getElementById('messages')
    const status   = document.getElementById('status')
    const input    = document.getElementById('input')

    let roomName = ''
    let userName = ''

    let ws            = null
    let retryCount    = 0
    const BASE_DELAY  = 1000   
    const MAX_DELAY   = 30000 

    function backoffDelay() {
      const exp    = Math.min(retryCount, 10)       
      const delay  = BASE_DELAY * Math.pow(2, exp)
      const jitter = delay * 0.2 * (Math.random() - 0.5)
      return Math.min(delay + jitter, MAX_DELAY)
    }

    function connect() {
      ws = new WebSocket(`ws://${location.host}/ws`)

      ws.onopen = () => {
        retryCount = 0   
        status.textContent = '● Connected'
        status.style.color = '#1D9E75'
        addMessage('Connected to chat', 'system')

        if (roomName) ws.send(`Room name: ${roomName}`)
        if (userName) ws.send(`Name: ${userName}`)
      }

      ws.onmessage = (e) => {
        e.data.split('\n').filter(Boolean).forEach(line => addMessage(line))
      }

      ws.onclose = () => {
        status.style.color = '#E24B4A'
        const delay = backoffDelay()
        const secs  = (delay / 1000).toFixed(1)
        status.textContent = `○ Disconnected — retrying in ${secs}s`
        addMessage(`Disconnected. Reconnecting in ${secs}s…`, 'system')
        retryCount++
        setTimeout(connect, delay) 
      }

      ws.onerror = () => {
        addMessage('WebSocket error', 'system')
      }
    }

    function addMessage(text, type = 'chat') {
      const div = document.createElement('div')
      div.className = `msg ${type}`
      div.textContent = text
      messages.appendChild(div)
      messages.scrollTop = messages.scrollHeight
    }

    document.getElementById('room-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const room = document.getElementById('room-input').value.trim()
      if (!room || ws.readyState !== WebSocket.OPEN) return
      roomName = room                       
      ws.send(`Room name: ${roomName}`)
      document.getElementById('room-form').style.display = 'none'
      document.getElementById('input').focus()
    })

    document.getElementById('name-form').addEventListener('submit', (e) => {
      e.preventDefault()
      const name = document.getElementById('name-input').value.trim()
      if (!name) return
      userName = name                       
      ws.send(`Name: ${userName}`)
      document.getElementById('name-form').style.display = 'none'
      document.getElementById('chat-form').style.display = 'flex'
      document.getElementById('input').focus()
    })

    document.getElementById('chat-form').addEventListener('submit', (e) => {
      e.preventDefault()
      if (ws.readyState === WebSocket.OPEN && input.value.trim()) {
        ws.send(input.value.trim())
        input.value = ''
      }
    })

    connect()
  </script>
</body>
</html>
